<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MedDeck</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const REASONS = [
  "Knowledge gap",
  "Misread the question",
  "Careless mistake",
  "Confused similar concepts",
  "Forgot detail"
];

function App() {
  const [screenshot, setScreenshot] = useState(null);
  const [reason, setReason] = useState(REASONS[0]);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [generatedCard, setGeneratedCard] = useState(null);
  const [editedFront, setEditedFront] = useState("");
  const [editedBack, setEditedBack] = useState("");
  const [saveResult, setSaveResult] = useState(null);
  const [rejected, setRejected] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    window.api.onScreenshot((base64) => {
      setScreenshot(base64);
      setGeneratedCard(null);
      setSaveResult(null);
      setRejected(null);
      setError(null);
    });
  }, []);

  const handleGenerate = async () => {
    if (!screenshot) return;
    setLoading(true);
    setError(null);

    const response = await window.api.generateCard(screenshot, reason);
    console.log('Generate response:', response);
    setLoading(false);

    if (response.error) {
      setError(response.error);
    } else if (response.is_question === false) {
      setRejected(response.reason);
    } else {
      setGeneratedCard(response);
      setEditedFront(response.anki_front);
      setEditedBack(response.anki_back);
    }
  };

  const handleSave = async () => {
    setSaving(true);
    setError(null);

    const response = await window.api.saveCard(editedFront, editedBack, reason);
    setSaving(false);

    if (response.error) {
      setError(response.error);
    } else {
      setSaveResult(response);
    }
  };

  const handleClose = () => {
    window.api.hidePopup();
    setGeneratedCard(null);
    setSaveResult(null);
    setRejected(null);
    setError(null);
    setScreenshot(null);
  };

  if (!screenshot) {
    return (
      <div className="container">
        <div className="header">MedDeck</div>
        <div className="empty">
          Press <kbd>⌘ ⇧ G</kbd> on a question you got wrong
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="header">
        New Card
        <button className="close-btn" onClick={handleClose}>×</button>
      </div>

      <img src={`data:image/png;base64,${screenshot}`} className="preview" />

      {!generatedCard && !rejected && !saveResult && (
        <>
          <label className="label">Why did you get it wrong?</label>
          <select 
            className="select" 
            value={reason} 
            onChange={(e) => setReason(e.target.value)}
          >
            {REASONS.map(r => <option key={r} value={r}>{r}</option>)}
          </select>

          <button 
            className="btn-primary" 
            onClick={handleGenerate}
            disabled={loading}
          >
            {loading ? "Generating..." : "Generate Card"}
          </button>
        </>
      )}

      {error && <div className="error">{error}</div>}

      {rejected && (
        <div className="rejected">
          <div className="rejected-title">⚠ Not a medical question</div>
          <div className="rejected-reason">{rejected}</div>
          <button className="btn-primary" onClick={handleClose}>Close</button>
        </div>
      )}

      {generatedCard && !saveResult && (
        <>
          <label className="label">Front (edit if needed)</label>
          <textarea
            className="textarea"
            value={editedFront}
            onChange={(e) => setEditedFront(e.target.value)}
            rows={3}
          />

          <label className="label">Back (edit if needed)</label>
          <textarea
            className="textarea"
            value={editedBack}
            onChange={(e) => setEditedBack(e.target.value)}
            rows={6}
          />

          <button 
            className="btn-primary" 
            onClick={handleSave}
            disabled={saving}
          >
            {saving ? "Saving..." : "Save to Anki"}
          </button>
        </>
      )}

      {saveResult && (
        <div className="success">
          <div className="success-title">✓ Card added to "{saveResult.deck}"</div>
          <button className="btn-primary" onClick={handleClose}>Done</button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
