<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Anki Card Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const REASONS = [
  "Knowledge gap",
  "Misread the question",
  "Careless mistake",
  "Confused similar concepts",
  "Forgot detail"
];

function App() {
  const [screenshot, setScreenshot] = useState(null);
  const [reason, setReason] = useState(REASONS[0]);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    window.api.onScreenshot((base64) => {
      setScreenshot(base64);
      setResult(null);
      setError(null);
    });
  }, []);

  const handleGenerate = async () => {
    if (!screenshot) return;
    setLoading(true);
    setError(null);

    const response = await window.api.generateCard(screenshot, reason);
    setLoading(false);

    if (response.error) {
      setError(response.error);
    } else {
      setResult(response);
    }
  };

  const handleClose = () => {
    window.api.hidePopup();
    setResult(null);
    setError(null);
    setScreenshot(null);
  };

  if (!screenshot) {
    return (
      <div className="container">
        <div className="header">Anki Card Generator</div>
        <div className="empty">
          Press <kbd>⌘ ⇧ G</kbd> on a question you got wrong
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="header">
        New Card
        <button className="close-btn" onClick={handleClose}>×</button>
      </div>

      <img src={`data:image/png;base64,${screenshot}`} className="preview" />

      {!result && (
        <>
          <label className="label">Why did you get it wrong?</label>
          <select 
            className="select" 
            value={reason} 
            onChange={(e) => setReason(e.target.value)}
          >
            {REASONS.map(r => <option key={r} value={r}>{r}</option>)}
          </select>

          <button 
            className="btn-primary" 
            onClick={handleGenerate}
            disabled={loading}
          >
            {loading ? "Generating..." : "Generate Card"}
          </button>
        </>
      )}

      {error && <div className="error">{error}</div>}

      {result && (
        <div className="success">
          <div className="success-title">✓ Card added to "{result.deck}"</div>
          <div className="card-preview">
            <div className="card-section">
              <div className="card-label">Front</div>
              <div>{result.card.anki_front}</div>
            </div>
            <div className="card-section">
              <div className="card-label">Back</div>
              <div>{result.card.anki_back}</div>
            </div>
          </div>
          <button className="btn-primary" onClick={handleClose}>Done</button>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
